name: Setup Xcode
description: Sets up the Xcode environment for the project

inputs:
  xcode-version:
    description: "Version of Xcode to install"
    required: false
    default: "16.4"

runs:
  using: composite
  steps:
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: ${{ inputs.xcode-version }}