name: Trigger release build to Firebase

on:
  repository_dispatch:
    types:
      - release-build

permissions:
  id-token: write
  contents: read

env:
  VERSION_NAME: ${{ github.event.client_payload.version_name }}
  RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}

jobs:
  update-version:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update SPM package version
        uses: ./.github/actions/update-spm-package
        with:
          version: ${{ env.VERSION_NAME }}

      - name: Update Xcode version
        run: |
          set -euo pipefail
          : "${VERSION_NAME:?Missing VERSION_NAME}"

          PBXPROJ="$(find . -name 'project.pbxproj' -path '*/*.xcodeproj/*' | head -n1)"
          CURRENT_BUILD="$(/usr/bin/awk -F' = ' '/CURRENT_PROJECT_VERSION/ { gsub(/;/, "", $2); print $2; exit }' "$PBXPROJ")"
          if [[ -z "$CURRENT_BUILD" ]]; then
            echo "Failed to read CURRENT_PROJECT_VERSION from $PBXPROJ" >&2
            exit 1
          fi
          BUILD_NUMBER="$((CURRENT_BUILD + 1))"

          /usr/bin/sed -i "" -E "s/(MARKETING_VERSION *= *)[^;]+/\\1${VERSION_NAME}/g" "$PBXPROJ"
          /usr/bin/sed -i "" -E "s/(CURRENT_PROJECT_VERSION *= *)[^;]+/\\1${BUILD_NUMBER}/g" "$PBXPROJ"

      - name: Update VERSION file
        run: |
          set -euo pipefail
          : "${VERSION_NAME:?Missing VERSION_NAME}"
          echo "${VERSION_NAME}" > VERSION

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SDK_RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            rokt-demo-ios

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
            token: ${{ steps.generate-token.outputs.token }}
            branch: release/${{ env.VERSION_NAME }}
            commit-message: Update ROKT SDK version to ${{ env.VERSION_NAME }}
            title: Update ROKT SDK version to ${{ env.VERSION_NAME }}
            body: |
                ${{ env.RELEASE_NOTES }}
            base: main
